# Publishes docker/vast-comfyui (PlusTrellis), docker/vast-comfyui-basic (Basic), and docker/vast-comfyui-hy3d to GHCR.
# Each image builds only when its directory (or this workflow) changes — not when sibling images change.
name: GHCR — Vast ComfyUI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "docker/vast-comfyui/**"
      - "docker/vast-comfyui-basic/**"
      - "docker/vast-comfyui-hy3d/**"
      - ".github/workflows/ghcr-vast-comfyui.yml"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      vast_comfyui: ${{ steps.pick.outputs.vast_comfyui }}
      vast_comfyui_basic: ${{ steps.pick.outputs.vast_comfyui_basic }}
      vast_comfyui_hy3d: ${{ steps.pick.outputs.vast_comfyui_hy3d }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            vast_comfyui:
              - 'docker/vast-comfyui/**'
              - '.github/workflows/ghcr-vast-comfyui.yml'
            vast_comfyui_basic:
              - 'docker/vast-comfyui-basic/**'
              - '.github/workflows/ghcr-vast-comfyui.yml'
            vast_comfyui_hy3d:
              - 'docker/vast-comfyui-hy3d/**'
              - '.github/workflows/ghcr-vast-comfyui.yml'
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "vast_comfyui=true" >> "$GITHUB_OUTPUT"
            echo "vast_comfyui_basic=true" >> "$GITHUB_OUTPUT"
            echo "vast_comfyui_hy3d=true" >> "$GITHUB_OUTPUT"
          else
            echo "vast_comfyui=${{ steps.filter.outputs.vast_comfyui }}" >> "$GITHUB_OUTPUT"
            echo "vast_comfyui_basic=${{ steps.filter.outputs.vast_comfyui_basic }}" >> "$GITHUB_OUTPUT"
            echo "vast_comfyui_hy3d=${{ steps.filter.outputs.vast_comfyui_hy3d }}" >> "$GITHUB_OUTPUT"
          fi

  build-vast-comfyui:
    needs: changes
    if: needs.changes.outputs.vast_comfyui == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vast-comfyui
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/vast-comfyui
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=vast-comfyui
          cache-to: type=gha,mode=max,scope=vast-comfyui

  build-vast-comfyui-basic:
    needs: changes
    if: needs.changes.outputs.vast_comfyui_basic == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vast-comfyui-basic
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/vast-comfyui-basic
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=vast-comfyui-basic
          cache-to: type=gha,mode=max,scope=vast-comfyui-basic

  build-vast-comfyui-hy3d:
    needs: changes
    if: needs.changes.outputs.vast_comfyui_hy3d == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/vast-comfyui-hy3d
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      # Docker requires lowercase registry paths; repository_owner can be mixed-case (e.g. CypherHub).
      - name: Base image for Hy3D (lowercase GHCR path)
        id: hy3d_base
        run: echo "image=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/vast-comfyui-basic:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker/vast-comfyui-hy3d
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VAST_BASE_IMAGE=${{ steps.hy3d_base.outputs.image }}
          cache-from: type=gha,scope=vast-comfyui-hy3d
          cache-to: type=gha,mode=max,scope=vast-comfyui-hy3d
