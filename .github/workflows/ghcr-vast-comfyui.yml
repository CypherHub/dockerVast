# Publishes docker/vast-comfyui (PlusTrellis) and docker/vast-comfyui-basic (Basic) to GHCR.
name: GHCR — Vast ComfyUI

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "docker/vast-comfyui/**"
      - "docker/vast-comfyui-basic/**"
      - ".github/workflows/ghcr-vast-comfyui.yml"

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: docker/vast-comfyui
            image_name: vast-comfyui
          - context: docker/vast-comfyui-basic
            image_name: vast-comfyui-basic
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}
